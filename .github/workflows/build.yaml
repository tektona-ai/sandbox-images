name: Build and push sandbox images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io/tektona-ai

jobs:
  build-base:
    if: github.ref_type != 'tag'
    runs-on: [self-hosted, linux, x64, proxmox, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract image tags and labels (base)
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/sandbox-base
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push base image
        id: build-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox-base/Dockerfile
          build-args: |
            IMAGE_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: type=gha,scope=sandbox-base
          cache-to: type=gha,mode=max,scope=sandbox-base

      - name: Trivy vulnerability scan (base)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sandbox-base:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          timeout: 15m  # default 5m is too short — times out analysing opt/google/chrome/resources.pak

      - name: Generate SBOM (base)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sandbox-base:${{ github.sha }}
          scan-type: image
          format: cyclonedx
          output: sandbox-base-sbom.cdx.json

      - name: Attest SBOM to registry (base)
        if: github.event_name != 'pull_request'
        run: cosign attest --yes --predicate sandbox-base-sbom.cdx.json --type cyclonedx ${{ env.REGISTRY }}/sandbox-base@${{ steps.build-base.outputs.digest }}

  build-desktop-x11:
    if: github.ref_type != 'tag'
    runs-on: [self-hosted, linux, x64, proxmox, ubuntu-24.04]
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract image tags and labels (desktop-x11)
        id: meta-desktop
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/desktop-x11
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push desktop-x11 image
        id: build-desktop-x11
        uses: docker/build-push-action@v6
        with:
          context: desktop-x11
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/sandbox-base:${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-desktop.outputs.tags }}
          labels: ${{ steps.meta-desktop.outputs.labels }}
          cache-from: type=gha,scope=desktop-x11
          cache-to: type=gha,mode=max,scope=desktop-x11

      - name: Trivy vulnerability scan (desktop-x11)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/desktop-x11:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          timeout: 15m  # default 5m is too short — times out analysing opt/google/chrome/resources.pak

      - name: Generate SBOM (desktop-x11)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/desktop-x11:${{ github.sha }}
          scan-type: image
          format: cyclonedx
          output: desktop-x11-sbom.cdx.json

      - name: Attest SBOM to registry (desktop-x11)
        if: github.event_name != 'pull_request'
        run: cosign attest --yes --predicate desktop-x11-sbom.cdx.json --type cyclonedx ${{ env.REGISTRY }}/desktop-x11@${{ steps.build-desktop-x11.outputs.digest }}

  build-doom:
    if: github.ref_type != 'tag'
    runs-on: [self-hosted, linux, x64, proxmox, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Login unconditionally so PRs can pull the released desktop-x11 base from
      # GHCR (the push is still guarded below by `push: ${{ ... != 'pull_request' }}`).
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract image tags and labels (doom)
        id: meta-doom
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/doom
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push doom image
        id: build-doom
        uses: docker/build-push-action@v6
        with:
          context: doom
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-doom.outputs.tags }}
          labels: ${{ steps.meta-doom.outputs.labels }}
          cache-from: type=gha,scope=doom
          cache-to: type=gha,mode=max,scope=doom

      - name: Trivy vulnerability scan (doom)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/doom:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          timeout: 15m  # default 5m is too short — times out analysing opt/google/chrome/resources.pak

      - name: Generate SBOM (doom)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/doom:${{ github.sha }}
          scan-type: image
          format: cyclonedx
          output: doom-sbom.cdx.json

      - name: Attest SBOM to registry (doom)
        if: github.event_name != 'pull_request'
        run: cosign attest --yes --predicate doom-sbom.cdx.json --type cyclonedx ${{ env.REGISTRY }}/doom@${{ steps.build-doom.outputs.digest }}

  # Retag an already-built SHA-tagged image with semver tags on a v* tag push.
  # No rebuild — `docker buildx imagetools create` just adds new tags to the
  # existing manifest digest. Requires that main has already built the tagged
  # commit's SHA image. PRs never reach this job (no tag trigger).
  tag-release:
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, x64, proxmox, ubuntu-24.04]
    strategy:
      matrix:
        image: [sandbox-base, desktop-x11, doom]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add semver tags to existing image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ matrix.image }}
          SRC_SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          VERSION="${REF#refs/tags/v}"
          SRC="${IMAGE}:${SRC_SHA}"

          # Verify the SHA-tagged source exists (commit must have been built on main).
          docker buildx imagetools inspect "$SRC" > /dev/null

          if [[ "$VERSION" == *-* ]]; then
            # Pre-release (e.g. v0.4.0-rc1): only tag the full version. No
            # major.minor rollup, no latest — don't promote unfinished work.
            echo "Pre-release $VERSION — tagging full version only."
            docker buildx imagetools create -t "${IMAGE}:${VERSION}" "$SRC"
          else
            # Stable: full version + major.minor + latest.
            MAJMIN="${VERSION%.*}"
            echo "Stable $VERSION — tagging ${VERSION}, ${MAJMIN}, latest."
            docker buildx imagetools create \
              -t "${IMAGE}:${VERSION}" \
              -t "${IMAGE}:${MAJMIN}" \
              -t "${IMAGE}:latest" \
              "$SRC"
          fi
